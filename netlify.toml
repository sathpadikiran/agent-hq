[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Pin the build + functions runtime so a fresh Netlify import builds
  # deterministically (Node 22 LTS supports fetch / AbortSignal.timeout /
  # base64url used by the functions).
  NODE_VERSION = "22"

[dev]
  command = "npm run dev:vite"
  port = 8888
  targetPort = 5173
  framework = "#custom"

[[redirects]]
  from = "/api/command"
  to = "/.netlify/functions/command"
  status = 200

[[redirects]]
  from = "/api/form/*"
  to = "/.netlify/functions/form-submit/:splat"
  status = 200

[[redirects]]
  from = "/api/webhook/*"
  to = "/.netlify/functions/webhook-receive/:splat"
  status = 200

[[redirects]]
  from = "/p/*"
  to = "/.netlify/functions/page-serve/:splat"
  status = 200

[[redirects]]
  from = "/t/*"
  to = "/.netlify/functions/track-click/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
